<h2 id="找到位点"><a href="#找到位点" class="headerlink" title="找到位点"></a>找到位点</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br></pre></td><td class="code"><pre><span class="line">protected EntryPosition findStartPositionInternal(ErosaConnection connection) &#123;</span><br><span class="line">    MysqlConnection mysqlConnection = (MysqlConnection) connection;</span><br><span class="line">    LogPosition logPosition = logPositionManager.getLatestIndexBy(destination);</span><br><span class="line">    if (logPosition == null) &#123;// 找不到历史成功记录</span><br><span class="line">        EntryPosition entryPosition = null;</span><br><span class="line">        if (masterInfo != null &amp;&amp; mysqlConnection.getConnector().getAddress().equals(masterInfo.getAddress())) &#123;</span><br><span class="line">            entryPosition = masterPosition;</span><br><span class="line">        &#125; else if (standbyInfo != null</span><br><span class="line">                   &amp;&amp; mysqlConnection.getConnector().getAddress().equals(standbyInfo.getAddress())) &#123;</span><br><span class="line">            entryPosition = standbyPosition;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        if (entryPosition == null) &#123;</span><br><span class="line">            entryPosition = findEndPositionWithMasterIdAndTimestamp(mysqlConnection); // 默认从当前最后一个位置进行消费</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        // 判断一下是否需要按时间订阅</span><br><span class="line">        if (StringUtils.isEmpty(entryPosition.getJournalName())) &#123;</span><br><span class="line">            // 如果没有指定binlogName，尝试按照timestamp进行查找</span><br><span class="line">            if (entryPosition.getTimestamp() != null &amp;&amp; entryPosition.getTimestamp() &gt; 0L) &#123;</span><br><span class="line">                logger.warn(&quot;prepare to find start position &#123;&#125;:&#123;&#125;:&#123;&#125;&quot;,</span><br><span class="line">                    new Object[] &#123; &quot;&quot;, &quot;&quot;, entryPosition.getTimestamp() &#125;);</span><br><span class="line">                return findByStartTimeStamp(mysqlConnection, entryPosition.getTimestamp());</span><br><span class="line">            &#125; else &#123;</span><br><span class="line">                logger.warn(&quot;prepare to find start position just show master status&quot;);</span><br><span class="line">                return findEndPositionWithMasterIdAndTimestamp(mysqlConnection); // 默认从当前最后一个位置进行消费</span><br><span class="line">            &#125;</span><br><span class="line">        &#125; else &#123;</span><br><span class="line">            if (entryPosition.getPosition() != null &amp;&amp; entryPosition.getPosition() &gt; 0L) &#123;</span><br><span class="line">                // 如果指定binlogName + offest，直接返回</span><br><span class="line">                entryPosition = findPositionWithMasterIdAndTimestamp(mysqlConnection, entryPosition);</span><br><span class="line">                logger.warn(&quot;prepare to find start position &#123;&#125;:&#123;&#125;:&#123;&#125;&quot;,</span><br><span class="line">                    new Object[] &#123; entryPosition.getJournalName(), entryPosition.getPosition(),</span><br><span class="line">                            entryPosition.getTimestamp() &#125;);</span><br><span class="line">                return entryPosition;</span><br><span class="line">            &#125; else &#123;</span><br><span class="line">                EntryPosition specificLogFilePosition = null;</span><br><span class="line">                if (entryPosition.getTimestamp() != null &amp;&amp; entryPosition.getTimestamp() &gt; 0L) &#123;</span><br><span class="line">                    // 如果指定binlogName +</span><br><span class="line">                    // timestamp，但没有指定对应的offest，尝试根据时间找一下offest</span><br><span class="line">                    EntryPosition endPosition = findEndPosition(mysqlConnection);</span><br><span class="line">                    if (endPosition != null) &#123;</span><br><span class="line">                        logger.warn(&quot;prepare to find start position &#123;&#125;:&#123;&#125;:&#123;&#125;&quot;,</span><br><span class="line">                            new Object[] &#123; entryPosition.getJournalName(), &quot;&quot;, entryPosition.getTimestamp() &#125;);</span><br><span class="line">                        specificLogFilePosition = findAsPerTimestampInSpecificLogFile(mysqlConnection,</span><br><span class="line">                            entryPosition.getTimestamp(),</span><br><span class="line">                            endPosition,</span><br><span class="line">                            entryPosition.getJournalName(),</span><br><span class="line">                            true);</span><br><span class="line">                    &#125;</span><br><span class="line">                &#125;</span><br><span class="line"></span><br><span class="line">                if (specificLogFilePosition == null) &#123;</span><br><span class="line">                    // position不存在，从文件头开始</span><br><span class="line">                    entryPosition.setPosition(BINLOG_START_OFFEST);</span><br><span class="line">                    return entryPosition;</span><br><span class="line">                &#125; else &#123;</span><br><span class="line">                    return specificLogFilePosition;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125; else &#123;</span><br><span class="line">        if (logPosition.getIdentity().getSourceAddress().equals(mysqlConnection.getConnector().getAddress())) &#123;</span><br><span class="line">            if (dumpErrorCountThreshold &gt;= 0 &amp;&amp; dumpErrorCount &gt; dumpErrorCountThreshold) &#123;</span><br><span class="line">                // binlog定位位点失败,可能有两个原因:</span><br><span class="line">                // 1. binlog位点被删除</span><br><span class="line">                // 2.vip模式的mysql,发生了主备切换,判断一下serverId是否变化,针对这种模式可以发起一次基于时间戳查找合适的binlog位点</span><br><span class="line">                boolean case2 = (standbyInfo == null || standbyInfo.getAddress() == null)</span><br><span class="line">                                &amp;&amp; logPosition.getPostion().getServerId() != null</span><br><span class="line">                                &amp;&amp; !logPosition.getPostion().getServerId().equals(findServerId(mysqlConnection));</span><br><span class="line">                if (case2) &#123;</span><br><span class="line">                    EntryPosition findPosition = fallbackFindByStartTimestamp(logPosition, mysqlConnection);</span><br><span class="line">                    dumpErrorCount = 0;</span><br><span class="line">                    return findPosition;</span><br><span class="line">                &#125;</span><br><span class="line">                // 处理 binlog 位点被删除的情况，提供自动重置到当前位点的功能</span><br><span class="line">                // 应用场景: 测试环境不稳定，位点经常被删。强烈不建议在正式环境中开启此控制参数，因为binlog 丢失调到最新位点也即意味着数据丢失</span><br><span class="line">                if (isAutoResetLatestPosMode()) &#123;</span><br><span class="line">                    dumpErrorCount = 0;</span><br><span class="line">                    return findEndPosition(mysqlConnection);</span><br><span class="line">                &#125;</span><br><span class="line">                Long timestamp = logPosition.getPostion().getTimestamp();</span><br><span class="line">                if (isRdsOssMode() &amp;&amp; (timestamp != null &amp;&amp; timestamp &gt; 0)) &#123;</span><br><span class="line">                    // 如果binlog位点不存在，并且属于timestamp不为空,可以返回null走到oss binlog处理</span><br><span class="line">                    return null;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125; else if (StringUtils.isBlank(logPosition.getPostion().getJournalName())</span><br><span class="line">                    &amp;&amp; logPosition.getPostion().getPosition() &lt;= 0</span><br><span class="line">                    &amp;&amp; logPosition.getPostion().getTimestamp() &gt; 0) &#123;</span><br><span class="line">                return fallbackFindByStartTimestamp(logPosition,mysqlConnection);</span><br><span class="line">            &#125;</span><br><span class="line">            // 其余情况</span><br><span class="line">            logger.warn(&quot;prepare to find start position just last position\n &#123;&#125;&quot;,</span><br><span class="line">                JsonUtils.marshalToString(logPosition));</span><br><span class="line">            return logPosition.getPostion();</span><br><span class="line">        &#125; else &#123;</span><br><span class="line">            // 针对切换的情况，考虑回退时间</span><br><span class="line">            long newStartTimestamp = logPosition.getPostion().getTimestamp() - fallbackIntervalInSeconds * 1000;</span><br><span class="line">            logger.warn(&quot;prepare to find start position by switch &#123;&#125;:&#123;&#125;:&#123;&#125;&quot;, new Object[] &#123; &quot;&quot;, &quot;&quot;,</span><br><span class="line">                    logPosition.getPostion().getTimestamp() &#125;);</span><br><span class="line">            return findByStartTimeStamp(mysqlConnection, newStartTimestamp);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br></pre></td></tr></table></figure>
